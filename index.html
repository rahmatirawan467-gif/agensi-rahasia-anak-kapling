<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agensi Rahasia Kapling | Official Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .comic-frame { box-shadow: 0 0 60px rgba(0,0,0,0.8); }
        .heart-active { fill: #ef4444; color: #ef4444 !important; }
    </style>
</head>
<body>

    <nav class="glass fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/30 font-black">ARK</div>
                <span class="font-extrabold tracking-tight text-xl uppercase italic">Agensi Rahasia <span class="text-indigo-500">Kapling</span></span>
            </div>
        </div>
    </nav>

    <div id="progress-bar" class="fixed top-[72px] left-0 h-1 bg-indigo-500 z-50 transition-all duration-150" style="width: 0%"></div>

    <main class="pt-28 pb-20 px-4">
        
        <header class="max-w-3xl mx-auto mb-16 text-center">
            <h2 class="text-xs font-bold text-indigo-500 uppercase tracking-[0.4em] mb-3 italic">Unit Operasional Khusus</h2>
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter uppercase leading-none">ARK KOMIK</h1>
            <div class="flex flex-wrap justify-center gap-4 text-gray-500 text-xs font-bold tracking-widest uppercase">
                <span>Rahmat Irawan</span> • <span>Satrio</span> • <span>Fairul</span> • <span>Paris</span>
            </div>
        </header>

        <div id="reader" class="max-w-[800px] mx-auto comic-frame bg-slate-900 rounded-2xl overflow-hidden border border-white/5">
            </div>

        <div class="max-w-[800px] mx-auto mt-12 text-center border-b border-white/5 pb-12">
            <button id="btn-like" class="group transition-transform active:scale-90 flex flex-col items-center mx-auto">
                <div class="p-5 bg-white/5 rounded-full group-hover:bg-red-500/10 mb-2 transition-all">
                    <i data-lucide="heart" id="icon-heart" class="w-12 h-12 text-gray-600 transition-all"></i>
                </div>
                <span id="text-like" class="font-black text-gray-400 text-sm tracking-widest uppercase italic">0 Laporan Disukai</span>
            </button>
        </div>

        <section class="max-w-[800px] mx-auto mt-16 p-6 bg-white/5 rounded-3xl border border-white/5">
            <h3 class="text-xl font-bold mb-8 flex items-center gap-3 text-indigo-400">
                <i data-lucide="message-circle"></i> DISKUSI AGEN PUBLIK
            </h3>
            
            <div id="disqus_thread"></div>
        </section>

    </main>

    <footer class="py-12 text-center text-gray-700 text-[10px] tracking-[0.5em] uppercase font-bold">
        © 2026 Agensi Rahasia Kapling - Unit ARK
    </footer>

    <script>
        lucide.createIcons();

        // 1. PENGATURAN GAMBAR
        const totalHalaman = 5; // <--- Ganti sesuai jumlah komikmu
        const folder = "img/";
        const reader = document.getElementById('reader');

        function loadImages() {
            // Foto Tim (Selfie)
            const team = document.createElement('img');
            team.src = folder + "team.jpg";
            team.className = "w-full block border-b-4 border-indigo-600 mb-2";
            team.onerror = () => team.style.display = 'none';
            reader.appendChild(team);

            // Komik (2.jpg, 3.jpg, dst)
            for (let i = 2; i <= totalHalaman + 1; i++) {
                const img = document.createElement('img');
                img.src = `${folder}${i}.jpg`;
                img.className = "w-full block opacity-0 transition-opacity duration-1000 border-b border-white/5";
                img.loading = "lazy";
                img.onload = () => img.classList.remove('opacity-0');
                reader.appendChild(img);
            }
        }

        // 2. LOGIKA LIKE (Sistem TikTok - Satu Orang Satu Like)
        let isLiked = localStorage.getItem('ark_user_liked') === 'true';
        let fakeLikes = 142; // Angka simulasi awal
        
        const btnLike = document.getElementById('btn-like');
        const iconHeart = document.getElementById('icon-heart');
        const textLike = document.getElementById('text-like');

        function updateUI() {
            textLike.innerText = `${isLiked ? fakeLikes + 1 : fakeLikes} LAPORAN DISUKAI`;
            if(isLiked) {
                iconHeart.classList.add('heart-active');
            } else {
                iconHeart.classList.remove('heart-active');
            }
        }

        btnLike.onclick = () => {
            isLiked = !isLiked;
            localStorage.setItem('ark_user_liked', isLiked);
            updateUI();
        };

        // 3. LOGIKA KOMENTAR PUBLIK (DISQUS)
        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = 'ark-komik-main'; 
        };
        (function() { 
            var d = document, s = d.createElement('script');
            // GANTI 'ark-komik-1' dengan Nama Singkat (Shortname) Disqus kamu
            s.src = 'https://ark-komik-1.disqus.com/embed.js'; 
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        loadImages();
        updateUI();
    </script>
</body>
</html>
