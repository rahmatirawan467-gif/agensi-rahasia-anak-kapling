<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agensi Rahasia Anak Kapling | Web Komik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Background Kartun: Pola Titik & Gradasi */
        body { 
            background-color: #020617;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .glass { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 2px solid #4f46e5; 
        }
        .comic-shadow { 
            box-shadow: 0 0 50px rgba(79, 70, 229, 0.3); 
            border: 4px solid #1e293b;
        }
        .header-text {
            text-shadow: 3px 3px 0px #4f46e5;
        }
    </style>
</head>
<body>

    <nav class="glass fixed top-0 w-full z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-center items-center">
            <h1 class="font-black italic tracking-tighter text-xl md:text-2xl uppercase text-white header-text">
                AGENSI RAHASIA ANAK KAPLING
            </h1>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-4 max-w-[850px] mx-auto">
        
        <div class="text-center mb-10">
            <p class="text-xs font-bold text-indigo-400 tracking-[0.3em] uppercase mb-2">Tim Kreatif:</p>
            <p class="text-sm font-semibold text-gray-400">Rahmat Irawan • Satrio • Fairul • Paris</p>
        </div>

        <div id="reader" class="comic-shadow bg-slate-900 rounded-3xl overflow-hidden mb-16">
            </div>

        <section class="bg-slate-900/80 p-6 md:p-10 rounded-[2rem] border-2 border-indigo-500/30">
            <h3 class="text-xl font-bold mb-8 flex items-center gap-3 text-indigo-400 uppercase italic">
                <i data-lucide="message-circle"></i> Ruang Diskusi Agen
            </h3>
            
            <div class="giscus">
                <p class="text-xs text-gray-500 text-center italic">Memuat diskusi publik... (Pastikan sudah terhubung ke GitHub)</p>
            </div>
        </section>

    </main>

    <footer class="py-12 text-center">
        <p class="text-gray-600 text-[10px] tracking-[0.5em] uppercase font-black">
            © 2026 Unit ARK - Dokumen Rahasia
        </p>
    </footer>

    <script>
        lucide.createIcons();

        // PENGATURAN GAMBAR
        const totalHalaman = 5; // <--- Ganti jumlah halaman komikmu di sini
        const reader = document.getElementById('reader');
        const folder = "img/";

        // 1. Memasukkan Foto Tim (Selfie)
        const team = document.createElement('img');
        team.src = folder + "team.jpg"; 
        team.className = "w-full border-b-8 border-indigo-600";
        team.onerror = () => team.style.display = 'none';
        reader.appendChild(team);

        // 2. Memasukkan Gambar Komik (2.jpg, 3.jpg, dst)
        for (let i = 2; i <= totalHalaman + 1; i++) {
            const img = document.createElement('img');
            img.src = `${folder}${i}.jpg`;
            img.className = "w-full border-b-2 border-slate-800 opacity-0 transition-opacity duration-700";
            img.loading = "lazy";
            img.onload = () => img.classList.remove('opacity-0');
            reader.appendChild(img);
        }
    </script>

    <script src="https://giscus.app/client.js"
        data-repo="[NAMA-USER-GITHUB]/[NAMA-REPO]"
        data-repo-id="[ID-REPO]"
        data-category="Announcements"
        data-category-id="[ID-KATEGORI]"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="dark"
        data-lang="id"
        crossorigin="anonymous"
        async>
    </script>

</body>
</html>
