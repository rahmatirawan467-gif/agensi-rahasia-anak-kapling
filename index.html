<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agensi Rahasia Kapling | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .heart-active { fill: #ef4444; color: #ef4444 !important; transform: scale(1.2); }
    </style>
</head>
<body>

    <nav class="glass fixed top-0 w-full z-50 p-4 text-center">
        <h1 class="font-black italic tracking-tighter text-xl uppercase">Agensi Rahasia <span class="text-indigo-500">Kapling</span></h1>
    </nav>

    <main class="pt-24 pb-20 px-4 max-w-[800px] mx-auto">
        
        <div id="reader" class="bg-slate-900 rounded-2xl overflow-hidden shadow-2xl border border-white/10 mb-10">
            </div>

        <div class="text-center mb-16">
            <button id="btn-like" class="group transition-all active:scale-90">
                <div class="p-5 bg-white/5 rounded-full mb-2 inline-block">
                    <i data-lucide="heart" id="icon-heart" class="w-10 h-10 text-gray-500 transition-all"></i>
                </div>
                <p id="text-like" class="font-bold text-gray-400 uppercase text-xs tracking-widest">Memuat Like...</p>
            </button>
            <p class="text-[10px] text-gray-600 mt-2 italic">*Like disimpan di browser kamu</p>
        </div>

        <section class="bg-slate-900/50 p-6 rounded-3xl border border-white/5">
            <h3 class="text-lg font-bold mb-6 flex items-center gap-2"><i data-lucide="message-circle"></i> DISKUSI AGEN</h3>
            
            <div class="giscus"></div>
        </section>

    </main>

    <script>
        lucide.createIcons();

        // 1. LOAD GAMBAR
        const totalHalaman = 5; 
        const reader = document.getElementById('reader');
        const folder = "img/";

        const team = document.createElement('img');
        team.src = folder + "team.jpg";
        team.className = "w-full border-b-4 border-indigo-600";
        reader.appendChild(team);

        for (let i = 2; i <= totalHalaman + 1; i++) {
            const img = document.createElement('img');
            img.src = `${folder}${i}.jpg`;
            img.className = "w-full border-b border-white/5";
            reader.appendChild(img);
        }

        // 2. LOGIKA LIKE (Sederhana)
        let likes = parseInt(localStorage.getItem('ark_likes_count')) || 143;
        let isLiked = localStorage.getItem('ark_is_liked') === 'true';
        const textLike = document.getElementById('text-like');
        const iconHeart = document.getElementById('icon-heart');

        function updateLikeUI() {
            textLike.innerText = `${isLiked ? likes + 1 : likes} Laporan Disukai`;
            isLiked ? iconHeart.classList.add('heart-active') : iconHeart.classList.remove('heart-active');
        }

        document.getElementById('btn-like').onclick = () => {
            isLiked = !isLiked;
            localStorage.setItem('ark_is_liked', isLiked);
            updateLikeUI();
        };
        updateLikeUI();

        // 3. LOGIKA KOMENTAR GISCUS (Bisa Dilihat Semua Orang)
        // Kamu harus mengaktifkan 'Discussions' di repo GitHub kamu
        // Lalu gunakan giscus.app untuk mendapatkan kode ini
    </script>

    <script src="https://giscus.app/client.js"
        data-repo="[NAMA-USER-GITHUB]/[NAMA-REPO]"
        data-repo-id="[ID-REPO]"
        data-category="Announcements"
        data-category-id="[ID-KATEGORI]"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="dark"
        data-lang="id"
        crossorigin="anonymous"
        async>
    </script>

</body>
</html>
