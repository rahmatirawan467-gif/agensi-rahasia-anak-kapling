<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Instant Access</title>
    
    <link rel="preload" as="image" href="img/team.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* 2. WARNA DASAR: Muncul instan sebelum foto selesai download */
        body { 
            background-color: #020617; 
            margin: 0;
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        #ark-bg-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Foto default langsung dipasang di CSS agar instan */
            background-image: url('img/team.jpg'); 
            filter: blur(8px) brightness(30%);
            transform: scale(1.1);
            transition: background-image 0.5s ease-in-out;
        }

        .ark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, rgba(2, 6, 23, 0.9), rgba(15, 23, 42, 0.7), rgba(30, 27, 75, 0.9));
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 3px solid #4f46e5; }
        .hidden-content { display: none !important; }
        .login-card { box-shadow: 0 0 70px rgba(79, 70, 229, 0.5); border: 2px solid #334155; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="ark-bg-image"></div>
    <div class="ark-overlay"></div>

    <div id="login-screen" class="w-full max-w-[420px] p-12 mx-4 login-card bg-slate-900/95 rounded-[3.5rem] text-center">
        <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-8">
            <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
        </div>
        <h2 class="font-black italic text-2xl uppercase mb-10 tracking-tighter text-white">Dekripsi Dokumen</h2>
        
        <input type="password" id="passInput" placeholder="KODE AGEN..." 
            class="w-full bg-black/60 border-2 border-indigo-500/20 rounded-2xl px-6 py-4 text-center focus:outline-none focus:border-indigo-500 transition-all mb-4 font-black text-white">
        
        <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl transition-all shadow-xl uppercase text-xs">
            Buka
        </button>
        <p id="errorMsg" class="text-red-500 text-[10px] mt-6 font-black uppercase hidden tracking-widest">Sandi Salah!</p>
    </div>

    <div id="main-content" class="hidden-content w-full min-h-screen">
        <nav class="glass fixed top-0 w-full z-50 p-4">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="font-black italic text-lg uppercase text-white tracking-tighter">ARK AGENSI</h1>
                <div class="text-[9px] font-bold text-indigo-300 uppercase tracking-widest">RAHMAT • SATRIO • FAIRUL • PARIS</div>
            </div>
        </nav>

        <main class="pt-32 px-4 max-w-[800px] mx-auto pb-20 text-center">
            <div class="bg-slate-900 rounded-[2.5rem] overflow-hidden border-2 border-indigo-500/20 shadow-2xl inline-block w-full">
                <div id="comic-viewport" class="w-full min-h-[400px]"></div>
            </div>

            <div class="mt-8 flex justify-center gap-4">
                <button id="prevBtn" class="p-4 bg-slate-800 rounded-2xl disabled:opacity-10"><i data-lucide="chevron-left"></i></button>
                <select id="pageSelect" class="bg-slate-800 border-2 border-indigo-500/30 text-white font-bold rounded-xl px-4 py-2 outline-none"></select>
                <button id="nextBtn" class="p-4 bg-indigo-600 rounded-2xl disabled:opacity-10"><i data-lucide="chevron-right"></i></button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const SANDI_RAHASIA = "ARK2026"; 
        
        // Logika Login
        const loginScreen = document.getElementById('login-screen');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');
        const loginBtn = document.getElementById('loginBtn');

        loginBtn.onclick = () => {
            if (passInput.value === SANDI_RAHASIA) {
                loginScreen.classList.add('hidden-content');
                mainContent.classList.remove('hidden-content');
                document.body.classList.remove('items-center', 'justify-center');
                gantiHalaman(1);
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        };

        // Logika Komik
        const jumlahHalamanKomik = 5; 
        const totalHalaman = jumlahHalamanKomik + 1;
        let indexHalaman = 1;
        const pathFolder = "img/";
        const viewport = document.getElementById('comic-viewport');
        const pageSelect = document.getElementById('pageSelect');
        const bgImage = document.getElementById('ark-bg-image');

        function gantiHalaman(nomor) {
            viewport.innerHTML = "";
            const imgSrc = (nomor === 1) ? pathFolder + "team.jpg" : `${pathFolder}${nomor}.jpg`;
            
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = "w-full block";
            viewport.appendChild(img);
            
            bgImage.style.backgroundImage = `url('${imgSrc}')`;
            pageSelect.value = nomor;
            document.getElementById('prevBtn').disabled = nomor === 1;
            document.getElementById('nextBtn').disabled = nomor === totalHalaman;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        for (let i = 1; i <= totalHalaman; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = i === 1 ? "COVER" : `HALAMAN ${i}`;
            pageSelect.appendChild(opt);
        }

        document.getElementById('prevBtn').onclick = () => { if(indexHalaman > 1) { indexHalaman--; gantiHalaman(indexHalaman); } };
        document.getElementById('nextBtn').onclick = () => { if(indexHalaman < totalHalaman) { indexHalaman++; gantiHalaman(indexHalaman); } };
        pageSelect.onchange = (e) => { indexHalaman = parseInt(e.target.value); gantiHalaman(indexHalaman); };
    </script>
</body>
</html>
