<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Secret Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ANIMASI BACKGROUND NO. 2 (GRADASI BERJALAN) */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            margin: 0;
        }

        /* Pola Titik Kartun agar tidak polos */
        .dot-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 3px solid #4f46e5; }
        .header-text { text-shadow: 2px 2px 0px #4f46e5; }
        .hidden-content { display: none !important; }
        .login-card { box-shadow: 0 0 60px rgba(79, 70, 229, 0.4); border: 2px solid #334155; }
        
        @keyframes pageFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-page { animation: pageFade 0.5s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="dot-pattern"></div>

    <div id="login-screen" class="w-full max-w-[400px] p-10 mx-4 login-card bg-slate-900/90 rounded-[3rem] text-center">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-indigo-500/40">
            <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
        </div>
        <h2 class="font-black italic text-2xl uppercase mb-3 tracking-tighter text-white">Akses Agen</h2>
        <p class="text-[10px] text-indigo-400 uppercase tracking-[0.4em] mb-10 font-black">Unit Rahasia Kapling</p>
        
        <input type="password" id="passInput" placeholder="KODE DEKRIPSI..." 
            class="w-full bg-black/60 border-2 border-indigo-500/20 rounded-2xl px-6 py-4 text-center focus:outline-none focus:border-indigo-500 transition-all mb-4 font-bold tracking-[0.5em] text-sm text-white">
        
        <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-indigo-600/30 uppercase tracking-widest text-xs active:scale-95">
            Buka Dokumen
        </button>
        <p id="errorMsg" class="text-red-500 text-[10px] mt-6 font-black uppercase hidden tracking-widest">Sandi Salah! Akses Ditolak.</p>
    </div>

    <div id="main-content" class="hidden-content w-full min-h-screen">
        <nav class="glass fixed top-0 w-full z-50 p-4">
            <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
                <h1 class="font-black italic text-lg md:text-2xl uppercase text-white header-text tracking-tighter">
                    AGENSI RAHASIA ANAK KAPLING
                </h1>
                <div class="flex items-center gap-3 text-[9px] font-bold text-indigo-300 tracking-[0.2em] uppercase">
                    <span>Rahmat</span> • <span>Satrio</span> • <span>Fairul</span> • <span>Paris</span>
                </div>
            </div>
        </nav>

        <main class="pt-32 px-4 max-w-[850px] mx-auto pb-20">
            <div class="bg-slate-900 rounded-[2.5rem] overflow-hidden border-2 border-indigo-500/20 shadow-2xl">
                <div id="comic-viewport" class="w-full min-h-[450px] flex items-center justify-center bg-black/20">
                    </div>
            </div>

            <div class="mt-12 flex flex-col items-center gap-8">
                <div class="flex items-center justify-between w-full max-w-[480px] bg-slate-900/80 p-4 rounded-3xl border border-white/5 shadow-xl">
                    
                    <button id="prevBtn" class="p-4 bg-slate-800 rounded-2xl hover:bg-indigo-600 transition-all disabled:opacity-10 active:scale-90">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    
                    <div class="flex flex-col items-center">
                        <span id="pageLabel" class="text-[9px] font-black text-indigo-500 mb-2 tracking-[0.3em] uppercase italic">Halaman Terbuka</span>
                        <select id="pageSelect" class="bg-slate-800 border-2 border-indigo-500/30 text-white font-bold rounded-xl px-5 py-2 outline-none cursor-pointer focus:border-indigo-500 transition-all"></select>
                    </div>

                    <button id="nextBtn" class="p-4 bg-indigo-600 rounded-2xl hover:bg-indigo-400 transition-all disabled:opacity-10 active:scale-90 shadow-lg shadow-indigo-600/20">
                        <i data-lucide="chevron-right" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <p class="text-[10px] text-gray-500 tracking-[0.4em] uppercase font-black">© 2026 Unit ARK - Dokumen Internal</p>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // KONFIGURASI KEAMANAN
        const SANDI_RAHASIA = "ARK2026"; 

        const loginScreen = document.getElementById('login-screen');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        // Fungsi Login
        loginBtn.onclick = () => {
            if (passInput.value === SANDI_RAHASIA) {
                loginScreen.classList.add('hidden-content');
                mainContent.classList.remove('hidden-content');
                document.body.classList.remove('items-center', 'justify-center');
                gantiHalaman(1); 
            } else {
                errorMsg.classList.remove('hidden');
                passInput.value = "";
                passInput.classList.add('border-red-500');
                setTimeout(() => passInput.classList.remove('border-red-500'), 1000);
            }
        };

        // KONFIGURASI KOMIK
        const jumlahHalamanKomik = 5; 
        const totalHalaman = jumlahHalamanKomik + 1;
        let indexHalaman = 1;
        const pathFolder = "img/";

        const viewport = document.getElementById('comic-viewport');
        const pageSelect = document.getElementById('pageSelect');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function gantiHalaman(nomor) {
            viewport.innerHTML = "";
            const img = document.createElement('img');
            img.src = (nomor === 1) ? pathFolder + "team.jpg" : `${pathFolder}${nomor}.jpg`;
            img.className = "w-full block animate-page";
            img.onerror = () => {
                viewport.innerHTML = `<div class="p-24 text-center text-gray-600 italic font-black uppercase tracking-widest text-[10px]">Laporan Halaman ${nomor} Tidak Ditemukan</div>`;
            };
            viewport.appendChild(img);
            
            pageSelect.value = nomor;
            prevBtn.disabled = nomor === 1;
            nextBtn.disabled = nomor === totalHalaman;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Buat Dropdown Halaman
        for (let i = 1; i <= totalHalaman; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = i === 1 ? "COVER AGEN" : `HALAMAN ${i}`;
            pageSelect.appendChild(opt);
        }

        prevBtn.onclick = () => { if(indexHalaman > 1) { indexHalaman--; gantiHalaman(indexHalaman); } };
        nextBtn.onclick = () => { if(indexHalaman < totalHalaman) { indexHalaman++; gantiHalaman(indexHalaman); } };
        pageSelect.onchange = (e) => { indexHalaman = parseInt(e.target.value); gantiHalaman(indexHalaman); };
    </script>
</body>
</html>
