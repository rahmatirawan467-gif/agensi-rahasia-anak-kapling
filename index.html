<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK | Restricted Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 3px solid #4f46e5; }
        .header-text { text-shadow: 2px 2px 0px #4f46e5; }
        .hidden-content { display: none; }
        .login-card { box-shadow: 0 0 50px rgba(79, 70, 229, 0.3); border: 2px solid #334155; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div id="login-screen" class="w-full max-w-[400px] p-8 mx-4 login-card bg-slate-900 rounded-[2.5rem] text-center animate-pulse-slow">
        <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/20">
            <i data-lucide="lock" class="text-white w-8 h-8"></i>
        </div>
        <h2 class="font-black italic text-xl uppercase mb-2 tracking-tighter text-white">Akses Terbatas</h2>
        <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mb-8 font-bold">Unit Agensi Rahasia Kapling</p>
        
        <input type="password" id="passInput" placeholder="MASUKKAN SANDI AGEN..." 
            class="w-full bg-black/50 border-2 border-indigo-500/30 rounded-2xl px-5 py-4 text-center focus:outline-none focus:border-indigo-500 transition mb-4 font-bold tracking-widest text-sm">
        
        <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl transition shadow-xl shadow-indigo-600/30 uppercase tracking-widest text-xs">
            Dekripsi Dokumen
        </button>
        <p id="errorMsg" class="text-red-500 text-[10px] mt-4 font-bold uppercase hidden">Sandi Salah! Akses Ditolak.</p>
    </div>

    <div id="main-content" class="hidden-content w-full">
        <nav class="glass fixed top-0 w-full z-50 p-4">
            <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center">
                <h1 class="font-black italic text-lg uppercase text-white header-text tracking-tighter">AGENSI RAHASIA ANAK KAPLING</h1>
                <div class="flex items-center gap-3 text-[10px] font-bold text-indigo-400 tracking-[0.2em] uppercase">
                    <span>Rahmat</span> • <span>Satrio</span> • <span>Fairul</span> • <span>Paris</span>
                </div>
            </div>
        </nav>

        <main class="pt-32 px-4 max-w-[800px] mx-auto pb-20">
            <div class="bg-slate-900 rounded-[2rem] overflow-hidden border-2 border-slate-700 shadow-2xl">
                <div id="comic-viewport" class="w-full min-h-[400px]"></div>
            </div>

            <div class="mt-10 flex flex-col items-center gap-6">
                <div class="flex items-center justify-between w-full max-w-[450px] bg-slate-900/50 p-4 rounded-3xl border border-white/5">
                    <button id="prevBtn" class="p-4 bg-slate-800 rounded-2xl hover:bg-indigo-600 transition disabled:opacity-20"><i data-lucide="chevron-left"></i></button>
                    <select id="pageSelect" class="bg-slate-800 border-2 border-indigo-500/30 text-white font-bold rounded-xl px-4 py-2 outline-none"></select>
                    <button id="nextBtn" class="p-4 bg-indigo-600 rounded-2xl hover:bg-indigo-500 transition disabled:opacity-20"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // 1. PENGATURAN KEAMANAN
        const SANDI_RAHASIA = "ARK2026"; // <--- GANTI SANDI KAMU DI SINI

        const loginScreen = document.getElementById('login-screen');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        loginBtn.onclick = () => {
            if (passInput.value === SANDI_RAHASIA) {
                // Berhasil Login
                loginScreen.classList.add('hidden-content');
                mainContent.classList.remove('hidden-content');
                document.body.classList.remove('items-center', 'justify-center');
                gantiHalaman(1); // Muat halaman pertama
            } else {
                // Gagal Login
                errorMsg.classList.remove('hidden');
                passInput.value = "";
                passInput.classList.add('border-red-500');
            }
        };

        // 2. SISTEM KOMIK
        const jumlahHalamanKomik = 5; 
        const totalHalaman = jumlahHalamanKomik + 1;
        let indexHalaman = 1;
        const folder = "img/";
        const viewport = document.getElementById('comic-viewport');
        const pageSelect = document.getElementById('pageSelect');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function gantiHalaman(nomor) {
            viewport.innerHTML = "";
            const img = document.createElement('img');
            img.src = (nomor === 1) ? folder + "team.jpg" : `${folder}${nomor}.jpg`;
            img.className = "w-full block opacity-0 transition-opacity duration-500";
            img.onload = () => img.classList.remove('opacity-0');
            viewport.appendChild(img);
            
            pageSelect.value = nomor;
            prevBtn.disabled = nomor === 1;
            nextBtn.disabled = nomor === totalHalaman;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        for (let i = 1; i <= totalHalaman; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = i === 1 ? "COVER" : `HALAMAN ${i}`;
            pageSelect.appendChild(opt);
        }

        prevBtn.onclick = () => { if(indexHalaman > 1) { indexHalaman--; gantiHalaman(indexHalaman); } };
        nextBtn.onclick = () => { if(indexHalaman < totalHalaman) { indexHalaman++; gantiHalaman(indexHalaman); } };
        pageSelect.onchange = (e) => { indexHalaman = parseInt(e.target.value); gantiHalaman(indexHalaman); };
    </script>
</body>
</html>
